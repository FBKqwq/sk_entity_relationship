    - C反应蛋白
    - PCT
    - ESR
    - 血沉
    - 抗体
  disease_terms:
    - 综合征
    - 疾病
    - 感染性疾病
    - 炎症性疾病
  treatment_terms:
    - 治疗原则
    - 治疗方案
    - 药物治疗
  etiology_terms:
    - 病因
    - 病原体
    - 感染因素
    - 结石因素
    - 自身免疫因素
    - 肿瘤相关因素
    - 危险因素
    - 诱因
  pathogenesis_terms:
