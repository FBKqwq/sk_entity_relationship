    - 病理生理
    - 炎症级联
    - 免疫反应
    - 结构改变
    - 代谢改变

llm_batching:
  enabled: true
  lv1_chunk_batch_size: 10
  lv2_entity_batch_size: 20
  max_chars_per_batch: 24000
  retry_missing_items: true
